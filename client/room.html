<!DOCTYPE html>
<html>
<head>
  <title>Videomeet Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #videoContainer {
      flex: 1;
      display: grid;
      gap: 10px;
      padding: 10px;
      align-content: center;
    }

    .video-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background: black;
      width: 100%;
      height: 100%;
      min-height: 0;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.35);
    }

    video {
      width: 100%;
      height: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 18px;
      background: black;
      display: block;
    }

    #myVideo {
      transform: scaleX(-1);
    }

    #videoContainer video:not(#myVideo) {
      transform: none;
    }

    /* ===============================
       Reaction Effects
    =============================== */

    .reaction-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 40;
      overflow: hidden;
    }

    /* HEART EFFECT */
    .heart-core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 92px;
      height: 82px;
      transform: translate(-50%, -50%) rotate(-45deg) scale(0.25);
      background: linear-gradient(135deg, #ff2d75, #ff0055);
      box-shadow:
        0 0 25px rgba(255, 45, 117, 0.95),
        0 0 60px rgba(255, 0, 85, 0.75);
      animation: heartCoreAnim 1.7s ease-out forwards;
    }

    .heart-core::before,
    .heart-core::after {
      content: "";
      position: absolute;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: inherit;
    }

    .heart-core::before {
      top: -46px;
      left: 0;
    }

    .heart-core::after {
      left: 46px;
      top: 0;
    }

    .heart-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(255, 80, 150, 0.85);
      transform: translate(-50%, -50%) scale(0.2);
      animation: ringExpand 1.3s ease-out forwards;
    }

    .heart-spark {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff8ab6;
      box-shadow: 0 0 14px #ff4f9a;
      animation: sparkFly 1.35s ease-out forwards;
    }

    @keyframes heartCoreAnim {
      0% {
        opacity: 0;
        transform: translate(-50%, -40%) rotate(-45deg) scale(0.2);
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(-45deg) scale(1.1);
      }
      45% {
        transform: translate(-50%, -52%) rotate(-45deg) scale(0.92);
      }
      75% {
        opacity: 1;
        transform: translate(-50%, -80%) rotate(-45deg) scale(1.05);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -125%) rotate(-45deg) scale(0.72);
      }
    }

    @keyframes ringExpand {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(3.2);
      }
    }

    @keyframes sparkFly {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.2);
      }
    }

    /* THUMBS EFFECT - CSS badge, not emoji */
    .thumb-badge {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 74px;
      height: 74px;
      border-radius: 24px;
      background: linear-gradient(135deg, #22c55e, #0ea5e9);
      transform: translate(-50%, -50%) scale(0.35);
      box-shadow:
        0 0 25px rgba(34, 197, 94, 0.8),
        0 0 55px rgba(14, 165, 233, 0.65);
      animation: thumbBadgeAnim 1.45s ease-out forwards;
    }

    .thumb-badge::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 46px;
      left: 18px;
      top: 18px;
      border-radius: 10px;
      background: #ffffff;
      transform: rotate(-20deg);
    }

    .thumb-badge::after {
      content: "";
      position: absolute;
      width: 36px;
      height: 22px;
      left: 32px;
      top: 34px;
      border-radius: 10px;
      background: #ffffff;
      box-shadow:
        0 11px 0 #ffffff,
        0 22px 0 #ffffff;
    }

    .thumb-ray {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 5px;
      height: 34px;
      border-radius: 99px;
      background: #7dd3fc;
      box-shadow: 0 0 14px #38bdf8;
      transform-origin: center 90px;
      animation: rayBurst 1.1s ease-out forwards;
    }

    @keyframes thumbBadgeAnim {
      0% {
        opacity: 0;
        transform: translate(-50%, -35%) scale(0.25) rotate(-10deg);
      }
      25% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.1) rotate(5deg);
      }
      65% {
        transform: translate(-50%, -65%) scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -115%) scale(0.75) rotate(0deg);
      }
    }

    @keyframes rayBurst {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--r)) scaleY(0.2);
      }
      30% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--r)) scaleY(1.4);
      }
    }

    /* ENERGY SHOT EFFECT */
    .energy-core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, #67e8f9 35%, #2563eb 75%);
      box-shadow:
        0 0 18px #67e8f9,
        0 0 42px #2563eb,
        0 0 80px rgba(37, 99, 235, 0.8);
      transform: translate(-50%, -50%) scale(0.35);
      animation: energyCoreAnim 0.75s ease-out forwards;
    }

    .energy-wave {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 3px solid rgba(103, 232, 249, 0.95);
      transform: translate(-50%, -50%) scale(0.2);
      animation: energyWaveAnim 0.7s ease-out forwards;
    }

    .energy-beam {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0;
      height: 16px;
      border-radius: 99px;
      background: linear-gradient(90deg, #e0f2fe, #22d3ee, transparent);
      box-shadow:
        0 0 15px #22d3ee,
        0 0 35px #2563eb;
      transform: translate(0, -50%);
      animation: energyBeamAnim 0.65s ease-out forwards;
    }

    .energy-particle {
      position: absolute;
      left: 55%;
      top: 50%;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #a5f3fc;
      box-shadow: 0 0 12px #22d3ee;
      animation: energyParticleAnim 0.75s ease-out forwards;
    }

    @keyframes energyCoreAnim {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }
      25% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.35);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.7);
      }
    }

    @keyframes energyWaveAnim {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(2.4);
      }
    }

    @keyframes energyBeamAnim {
      0% {
        opacity: 0;
        width: 0;
      }
      25% {
        opacity: 1;
        width: 95px;
      }
      100% {
        opacity: 0;
        width: 190px;
      }
    }

    @keyframes energyParticleAnim {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(0.3);
      }
    }

    /* FLOWER BOUQUET EFFECT */
    .flower-center {
      position: absolute;
      left: 50%;
      top: 55%;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: radial-gradient(circle, #fde68a, #f59e0b);
      box-shadow: 0 0 22px rgba(251, 191, 36, 0.9);
      transform: translate(-50%, -50%) scale(0.3);
      animation: flowerCenterAnim 1.5s ease-out forwards;
      z-index: 2;
    }

    .flower-petal {
      position: absolute;
      left: 50%;
      top: 55%;
      width: 22px;
      height: 38px;
      border-radius: 22px 22px 6px 6px;
      background: linear-gradient(180deg, #f9a8d4, #ec4899);
      box-shadow: 0 0 16px rgba(236, 72, 153, 0.75);
      transform-origin: center 90px;
      animation: petalBloom 1.55s ease-out forwards;
    }

    .flower-petal.alt {
      background: linear-gradient(180deg, #c4b5fd, #8b5cf6);
      box-shadow: 0 0 16px rgba(139, 92, 246, 0.75);
    }

    .flower-stem {
      position: absolute;
      left: 50%;
      top: 57%;
      width: 7px;
      height: 80px;
      border-radius: 99px;
      background: linear-gradient(180deg, #22c55e, #15803d);
      transform: translate(-50%, 0) scaleY(0.2);
      transform-origin: top;
      animation: stemGrow 1.4s ease-out forwards;
    }

    @keyframes flowerCenterAnim {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }
      30% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -95%) scale(0.85);
      }
    }

    @keyframes petalBloom {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--r)) translateY(0) scale(0.2);
      }
      30% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--r)) translateY(-95px) scale(0.95);
      }
    }

    @keyframes stemGrow {
      0% {
        opacity: 0;
        transform: translate(-50%, 0) scaleY(0.1);
      }
      40% {
        opacity: 1;
        transform: translate(-50%, 0) scaleY(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -45px) scaleY(0.8);
      }
    }

    /* ===============================
       Controls
    =============================== */

    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(15, 23, 42, 0.78);
      backdrop-filter: blur(12px);
      padding: 10px 15px;
      border-radius: 50px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    .controls button {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .controls button:hover {
      transform: translateY(-2px);
    }

    .controls button:active {
      transform: scale(0.92);
    }

    #muteBtn,
    #shareBtn {
      background: #1e293b;
      color: white;
    }

    #leaveBtn {
      background: #dc2626;
      color: white;
    }

    #participantsCount {
      font-size: 14px;
      opacity: 0.85;
      margin-left: 5px;
      white-space: nowrap;
    }

    /* Name popup */
    #namePopup {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .name-card {
      background: white;
      color: #111827;
      padding: 22px;
      border-radius: 14px;
      text-align: center;
      width: min(90vw, 340px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .name-card h3 {
      margin: 0 0 12px;
    }

    .name-card input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      margin: 0 0 12px;
      outline: none;
    }

    .name-card button {
      width: 100%;
      height: 42px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    /* Share popup */
    .share-popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2100;
    }

    .share-popup-card {
      width: min(92vw, 420px);
      background: #111827;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }

    .share-popup-card h3 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .share-field {
      margin-bottom: 14px;
    }

    .share-field label {
      display: block;
      font-size: 13px;
      opacity: 0.75;
      margin-bottom: 6px;
    }

    .share-row {
      display: flex;
    }

    .share-row input {
      flex: 1;
      height: 42px;
      padding: 0 12px;
      border: none;
      outline: none;
      border-radius: 10px 0 0 10px;
      background: #1f2937;
      color: white;
    }

    .share-row button {
      width: 50px;
      height: 42px;
      border: none;
      border-radius: 0 10px 10px 0;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .share-close-btn {
      width: 100%;
      height: 42px;
      border: none;
      border-radius: 10px;
      background: #dc2626;
      color: white;
      cursor: pointer;
      margin-top: 6px;
    }

    /* Mobile layout: two users show as two big squarish stacked tiles */
    @media (max-width: 768px) {
      body {
        height: 100dvh;
      }

      #videoContainer {
        grid-template-columns: 1fr !important;
        grid-auto-rows: minmax(230px, 40vh);
        padding: 10px;
        padding-bottom: 96px;
        gap: 12px;
        align-content: start;
        overflow-y: auto;
      }

      #videoContainer.two-users {
        grid-auto-rows: minmax(245px, 40vh);
      }

      #videoContainer.one-user {
        grid-auto-rows: minmax(360px, 1fr);
      }

      .video-wrapper {
        border-radius: 22px;
        min-height: 230px;
      }

      video {
        border-radius: 22px;
        aspect-ratio: auto;
      }

      .controls {
        bottom: 10px;
        gap: 10px;
        padding: 8px 12px;
      }

      .controls button {
        width: 45px;
        height: 45px;
        font-size: 18px;
      }

      #participantsCount {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <div id="namePopup">
    <div class="name-card">
      <h3>Enter your name</h3>
      <input id="nameInput" type="text" placeholder="Your name" />
      <button id="joinBtn" type="button">Join</button>
    </div>
  </div>

  <div id="videoContainer" class="one-user">
    <div class="video-wrapper" id="wrapper-myVideo">
      <video id="myVideo" autoplay muted playsinline></video>
      <div class="reaction-layer" id="reaction-myVideo"></div>
    </div>
  </div>

  <div class="controls">
    <button id="muteBtn" title="Mute" type="button">
      <i class="ph ph-microphone"></i>
    </button>

    <button id="shareBtn" title="Share" type="button">
      <i class="ph ph-share-network"></i>
    </button>

    <button id="leaveBtn" title="Leave" type="button">
      <i class="ph ph-phone-disconnect"></i>
    </button>

    <span id="participantsCount">👥 1</span>
  </div>

  <div id="sharePopup" class="share-popup-overlay">
    <div class="share-popup-card">
      <h3>Share Meeting</h3>

      <div class="share-field">
        <label>Room ID</label>
        <div class="share-row">
          <input id="roomIdText" type="text" readonly />
          <button id="copyRoomBtn" type="button">
            <i class="ph ph-copy"></i>
          </button>
        </div>
      </div>

      <div class="share-field">
        <label>Invite Link</label>
        <div class="share-row">
          <input id="linkText" type="text" readonly />
          <button id="copyLinkBtn" type="button">
            <i class="ph ph-copy"></i>
          </button>
        </div>
      </div>

      <button id="closePopup" class="share-close-btn" type="button">Close</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
